<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#D4AF37">
    <title>فريق نعاون لخدمات التوصيل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F4C430;
            --red: #D4AF37;
            --red-bright: #FFD700;
            --light-bg: #fdfdfd;
            --card-bg: #ffffff;
            --text: #333333;
            --text-light: #666666;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--light-bg);
            color: var(--text);
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            min-height: 100vh; text-align: center;
        }

        header {
            width: 100%;
            padding: 30px 20px;
            background: linear-gradient(to bottom, var(--red), var(--light-bg));
            border-bottom: 2px solid var(--gold);
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .logo-container {
            position: relative;
            width: 120px; height: 120px;
            margin: 0 auto 15px auto;
        }

        .logo-container img {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 3px solid var(--gold);
            object-fit: cover;
            position: relative; z-index: 2;
        }

        .logo-container::after {
            content: "";
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%; background: var(--gold);
            opacity: 0.5; animation: pulse 2s infinite; z-index: 1;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        h1 { color: var(--gold); font-size: 2.5rem; margin-bottom: 5px; }
        .slogan { font-size: 1.1rem; font-weight: bold; }

        .menu-container {
            display: flex; flex-direction: column;
            gap: 20px; width: 90%; max-width: 400px;
            margin: 0 auto; animation: fadeIn 1s ease-in;
        }

        .main-btn {
            background: var(--card-bg);
            border: 2px solid var(--red);
            color: var(--red);
            padding: 18px; font-size: 1.2rem; font-weight: bold;
            border-radius: 15px; cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .main-btn:hover { background: var(--red); color: white; transform: translateY(-3px); }

        .page-section {
            display: none; background-color: var(--card-bg);
            width: 90%; max-width: 500px; margin: 0 auto 40px auto;
            padding: 30px; border-radius: 20px;
            border: 1px solid #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            animation: slideUp 0.5s ease;
        }

        .input-group { margin-bottom: 20px; text-align: right; }
        label { display: block; color: var(--text-light); margin-bottom: 8px; font-weight: bold; }

        input, textarea, select {
            width: 100%; padding: 12px;
            background: #f9f9f9; border: 1px solid #ddd;
            border-radius: 12px; font-size: 16px !important;
            font-family: 'Tajawal', sans-serif; outline: none;
            box-sizing: border-box; -webkit-appearance: none;
        }

        input:focus { border-color: var(--gold); background: #fff; }

        .submit-btn {
            width: 100%; padding: 15px;
            background: var(--red); color: white;
            border: none; border-radius: 12px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
        }

        .back-btn {
            margin-top: 15px; background: transparent;
            border: 1px solid #ccc; color: #777;
            padding: 8px 20px; border-radius: 20px; cursor: pointer;
        }

        .loader {
            display: none; border: 4px solid #f3f3f3;
            border-top: 4px solid var(--red); border-radius: 50%;
            width: 30px; height: 30px; animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        .table-container { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #eee; font-size: 0.9rem; }
        th { background-color: var(--red); color: white; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="https://i.imgur.com/nYQiffV.png" alt="شعار فريق نعاون">
        </div>
        <h1>فريق نعاون</h1>
        <div class="slogan">لخدمات التوصيل</div>
    </header>

    <div id="mainMenu" class="menu-container">
        <button class="main-btn" onclick="showSection('driverLoginSec')">لوحة المناديب</button>
        <button class="main-btn" onclick="showSection('settingsSec')">الإعدادات</button>
    </div>

    <div id="driverLoginSec" class="page-section">
        <h2>دخول المندوب</h2>
        <div class="input-group">
            <label>رقم بطاقة المندوب</label>
            <input type="text" id="driverCardInput" placeholder="أدخل رقم بطاقتك">
        </div>
        <button onclick="checkDriverLogin()" class="submit-btn">متابعة</button>
        <button class="back-btn" onclick="goBack()">عودة</button>
    </div>

    <div id="driverOptionsSec" class="page-section">
        <h2 id="driverWelcome">أهلاً بك</h2>
        <button class="main-btn" style="margin-bottom:10px" onclick="showSection('deductionSec')">تسجيل استقطاعات</button>
        <button class="main-btn" onclick="showSection('invoiceSec')">تسجيل فاتورة طلبية</button>
        <button class="back-btn" onclick="goBack()">تسجيل خروج</button>
    </div>

    <div id="deductionSec" class="page-section">
        <h2>تسجيل استقطاع جديد</h2>
        <form id="deductionForm" onsubmit="submitDeduction(event)">
            <div class="input-group">
                <label>اسم المندوب</label>
                <input type="text" name="driver" placeholder="اكتب اسمك الثلاثي" required>
            </div>
            <input type="hidden" name="card_id" id="hiddenCardId1">
            <div class="input-group">
                <label>عدد الطلبات</label>
                <input type="number" name="orders_count" required>
            </div>
            <div class="input-group">
                <label>التاريخ</label>
                <input type="date" name="date_val" required>
            </div>
            <div class="input-group">
                <label>مبلغ التوصيل (كل مبلغ في سطر جديد)</label>
                <textarea name="amounts" rows="4" placeholder="مثال:&#10;1.500&#10;2.000"></textarea>
            </div>
            <div class="input-group">
                <label>الاستقطاع الكلي (ر.ع)</label>
                <input type="text" name="deduction" required>
            </div>
            <button type="submit" class="submit-btn">إرسال البيانات</button>
            <div id="loader1" class="loader"></div>
        </form>
        <button class="back-btn" onclick="showSection('driverOptionsSec')">رجوع</button>
    </div>

    <div id="invoiceSec" class="page-section">
        <h2>تسجيل فاتورة طلبية</h2>
        <form id="invoiceForm" onsubmit="submitInvoice(event)">
            <div class="input-group">
                <label>اسم المطعم</label>
                <input type="text" name="rest_name" required>
            </div>
            <div class="input-group">
                <label>اسم المندوب</label>
                <input type="text" name="driver_name" placeholder="اكتب اسمك الثلاثي" required>
            </div>
            <input type="hidden" name="card_id" id="hiddenCardId2">
            <div class="input-group">
                <label>مكان التوصيل</label>
                <input type="text" name="location" required>
            </div>
            <div class="input-group">
                <label>التاريخ</label>
                <input type="date" name="date_val" required>
            </div>
            <div class="input-group">
                <label>تفاصيل الطلبية</label>
                <textarea name="details" rows="3" required></textarea>
            </div>
            <div class="input-group">
                <label>قيمة الطلبية (ر.ع)</label>
                <input type="number" step="0.001" name="price" required>
            </div>
            <button type="submit" class="submit-btn">إرسال الفاتورة</button>
            <div id="loader2" class="loader"></div>
        </form>
        <button class="back-btn" onclick="showSection('driverOptionsSec')">رجوع</button>
    </div>

    <div id="settingsSec" class="page-section">
        <div id="loginBlock">
            <h2>دخول الشركاء</h2>
            <div class="input-group">
                <label>اسم المطعم</label>
                <input type="text" id="loginRestName" placeholder="أدخل اسم المطعم بدقة">
            </div>
            <div class="input-group">
                <label>الرمز السري</label>
                <input type="password" id="loginPass">
            </div>
            <button onclick="checkLogin()" class="submit-btn">تسجيل الدخول</button>
            <div id="loader3" class="loader"></div>
        </div>
        <div id="dashboardBlock" style="display: none;">
            <h2 id="dashTitle">ملخص الطلبات</h2>
            <div class="table-container" id="resultsArea"></div>
            <button onclick="location.reload()" class="submit-btn" style="background: #666; margin-top: 15px;">تسجيل خروج</button>
        </div>
        <button class="back-btn" onclick="goBack()">عودة للقائمة</button>
    </div>

    <footer style="text-align: center; padding: 20px; background: #f8f9fa; margin-top: 30px;">
        <button id="showDeductionBtn" style="padding: 10px 20px; background: var(--gold); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px;">
            جدول الاستقطاع
        </button>
        <div style="margin-top: 10px;">
            <button id="adminLoginBtn" style="background: transparent; border: none; color: #aaa; text-decoration: underline; font-size: 14px; cursor: pointer;">
                دخول الإدارة
            </button>
        </div>
    </footer>

    <div id="adminPanel" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; z-index: 10000; overflow-y: auto;">
        <div style="background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0;">
            <h2 style="margin: 0; color: var(--gold); font-size: 18px;">ملخص أداء المناديب</h2>
            <span id="closeAdminPanel" style="font-size: 30px; font-weight: bold; color: #e74c3c; cursor: pointer;">&times;</span>
        </div>
        <div id="adminContent" style="padding: 15px;"></div>
    </div>

    <div id="imageModal" style="display: none; position: fixed; z-index: 99999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); text-align: center;">
        <span id="closeModal" style="position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer;">&times;</span>
        <img src="https://i.imgur.com/nYQiffV.png" id="modalImg" style="max-width: 90%; margin-top: 60px; border: 2px solid white; border-radius: 10px;">
    </div>

    <script>
        // 1. إعدادات الرابط والبيانات
        const scriptURL = "https://script.google.com/macros/s/AKfycbyf2D55ex68VviASP08gZP11jEqwMwhdliNSklyhpPVco8mQhfaZEAxc1JekpZTp1Pa/exec";
        window.globalData = null;

        // 2. جلب البيانات تلقائياً
        async function fetchGoogleData() {
            try {
                const response = await fetch(scriptURL);
                window.globalData = await response.json();
                console.log("تم تحديث البيانات بنجاح");
            } catch (error) {
                console.error("خطأ في جلب البيانات:", error);
            }
        }
        window.addEventListener('load', fetchGoogleData);

        // 3. وظائف التنقل
        function showSection(id) {
            document.getElementById('mainMenu').style.display = 'none';
            document.querySelectorAll('.page-section').forEach(sec => sec.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            window.scrollTo(0,0);
        }

        function goBack() {
            document.querySelectorAll('.page-section').forEach(sec => sec.style.display = 'none');
            document.getElementById('mainMenu').style.display = 'flex';
        }

        // 4. نظام دخول المندوب
        function checkDriverLogin() {
            const cardId = document.getElementById('driverCardInput').value.trim();
            if (cardId !== "") {
                document.getElementById('hiddenCardId1').value = cardId;
                document.getElementById('hiddenCardId2').value = cardId;
                document.getElementById('driverWelcome').innerText = "رقم البطاقة: " + cardId;
                showSection('driverOptionsSec');
            } else {
                alert("الرجاء إدخال رقم البطاقة");
            }
        }

        // 5. إرسال البيانات (استقطاع)
        async function submitDeduction(e) {
            e.preventDefault();
            const loader = document.getElementById('loader1');
            const btn = e.target.querySelector('button');
            loader.style.display = 'block';
            btn.disabled = true;

            const formData = new FormData(e.target);
            formData.append('action', 'addDeduction');

            try {
                await fetch(scriptURL, { method: "POST", body: formData });
                alert("تم الإرسال بنجاح! ✅");
                e.target.reset();
                fetchGoogleData();
                showSection('driverOptionsSec');
            } catch (error) {
                alert("حدث خطأ في الإرسال ❌");
            } finally {
                loader.style.display = 'none';
                btn.disabled = false;
            }
        }

        // 6. إرسال البيانات (فاتورة)
        async function submitInvoice(e) {
            e.preventDefault();
            const loader = document.getElementById('loader2');
            const btn = e.target.querySelector('button');
            loader.style.display = 'block';
            btn.disabled = true;

            const formData = new FormData(e.target);
            formData.append('action', 'addInvoice');

            try {
                await fetch(scriptURL, { method: "POST", body: formData });
                alert("تم إرسال الفاتورة بنجاح! ✅");
                e.target.reset();
                fetchGoogleData();
                showSection('driverOptionsSec');
            } catch (error) {
                alert("حدث خطأ ❌");
            } finally {
                loader.style.display = 'none';
                btn.disabled = false;
            }
        }

        // 7. دخول الشركاء (المطاعم)
        function checkLogin() {
            const restName = document.getElementById('loginRestName').value.trim();
            const pass = document.getElementById('loginPass').value;
            if (pass !== "res9090") { alert("الرمز السري غير صحيح ❌"); return; }
            
            if (!window.globalData) { alert("جاري تحميل البيانات.. حاول مرة أخرى"); return; }

            const myOrders = (window.globalData.invoices || []).filter(row => row[1] == restName);
            if (myOrders.length === 0) { alert("لا توجد طلبات لهذا المطعم"); return; }

            let html = `<table><thead><tr><th>المندوب</th><th>التاريخ</th><th>المكان</th><th>القيمة</th></tr></thead><tbody>`;
            myOrders.forEach(row => {
                let dateStr = row[4] ? row[4].split('T')[0] : "---";
                html += `<tr><td>${row[2]}</td><td>${dateStr}</td><td>${row[3]}</td><td>${row[6]}</td></tr>`;
            });
            html += `</tbody></table>`;
            
            document.getElementById('resultsArea').innerHTML = html;
            document.getElementById('loginBlock').style.display = 'none';
            document.getElementById('dashboardBlock').style.display = 'block';
        }

        // 8. أزرار الفوتر (جدول الاستقطاع + الإدارة)
        document.addEventListener("DOMContentLoaded", function() {
            const modal = document.getElementById("imageModal");
            const adminPanel = document.getElementById("adminPanel");

            // زر الصورة
            document.getElementById("showDeductionBtn").onclick = function() {
                modal.style.display = "block";
            };
            document.getElementById("closeModal").onclick = function() {
                modal.style.display = "none";
            };

            // زر الإدارة
            document.getElementById("adminLoginBtn").onclick = function() {
                let pwd = prompt("كلمة مرور الإدارة:");
                if (pwd === "9090") {
                    adminPanel.style.display = "block";
                    generateAdminReport();
                } else if (pwd !== null) {
                    alert("كلمة المرور غير صحيحة ❌");
                }
            };
            document.getElementById("closeAdminPanel").onclick = function() {
                adminPanel.style.display = "none";
            };

            // إغلاق النوافذ عند الضغط خارجها
            window.onclick = function(event) {
                if (event.target == modal) modal.style.display = "none";
                if (event.target == adminPanel) adminPanel.style.display = "none";
            };
        });

        // 9. دالة تقرير الإدارة
        function generateAdminReport() {
            const container = document.getElementById("adminContent");
            if (!window.globalData) {
                container.innerHTML = "<p>جاري تحميل البيانات...</p>";
                return;
            }

            let drivers = {};
            const inv = window.globalData.invoices || [];
            const ded = window.globalData.deductions || [];

            // معالجة الفواتير
            inv.slice(1).forEach(row => {
                let name = row[2];
                let price = parseFloat(row[8]) || 0;
                if(!drivers[name]) drivers[name] = { count: 0, total: 0, deds: 0 };
                drivers[name].count++;
                drivers[name].total += price;
            });

            // معالجة الاستقطاعات
            ded.slice(1).forEach(row => {
                let name = row[1];
                let val = parseFloat(row[8]) || 0;
                if(!drivers[name]) drivers[name] = { count: 0, total: 0, deds: 0 };
                drivers[name].deds += val;
            });

            let html = "";
            for (let name in drivers) {
                let d = drivers[name];
                html += `
                <div style="background:white; padding:15px; margin-bottom:15px; border-radius:10px; border-right:5px solid var(--gold); box-shadow:0 2px 5px rgba(0,0,0,0.1);">
                    <h3 style="margin:0 0 10px 0;">👤 ${name}</h3>
                    <div style="display:flex; justify-content:space-between;"><span>الطلبات:</span> <b>${d.count}</b></div>
                    <div style="display:flex; justify-content:space-between;"><span>المحصل:</span> <b style="color:green;">${d.total.toFixed(3)}</b></div>
                    <div style="display:flex; justify-content:space-between;"><span>الاستقطاع:</span> <b style="color:red;">${d.deds.toFixed(3)}</b></div>
                    <div style="display:flex; justify-content:space-between; margin-top:10px; border-top:1px solid #eee; padding-top:5px;">
                        <span>الصافي:</span> <b>${(d.total - d.deds).toFixed(3)}</b>
                    </div>
                </div>`;
            }
            container.innerHTML = html || "<p>لا توجد بيانات حالياً</p>";
        }
    </script>
</body>
</html>
